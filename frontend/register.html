<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AI Bank — Register</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🏦 AI Bank</h1>
      <p>Create your free account</p>
    </div>
    <div id="err" class="alert alert-err"></div>
    <div id="ok" class="alert alert-ok"></div>
    <form id="form">
      <div class="field"><label>Full Name</label>
        <input id="name" type="text" placeholder="Your full name" required/>
      </div>
      <div class="field"><label>Email</label>
        <input id="email" type="email" placeholder="you@email.com" required/>
      </div>
      <div class="field"><label>Phone</label>
        <input id="phone" type="tel" placeholder="+91 98765 43210" required/>
      </div>
      <div class="field"><label>Username</label>
        <input id="user" type="text" placeholder="Choose a username" required autocomplete="username"/>
      </div>
      <div class="field"><label>Password</label>
        <input id="pass" type="password" placeholder="Min 8 chars, include a number" required autocomplete="new-password"/>
      </div>
      <button class="btn btn-primary" type="submit">Create Account</button>
    </form>
    <div class="auth-link">Already have an account? <a href="index.html">Sign in</a></div>
  </div>
</div>
<script>
const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
  ? "http://127.0.0.1:5000"
  : "https://ai-online-banking-system-1.onrender.com";
document.getElementById("form").onsubmit = async e => {
  e.preventDefault();
  const err = document.getElementById("err"), ok = document.getElementById("ok");
  err.style.display = ok.style.display = "none";
  const res = await fetch(`${API}/api/register`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      username: document.getElementById("user").value,
      password: document.getElementById("pass").value
    })
  });
  const d = await res.json();
  if (res.ok) {
    ok.textContent = "Account created! Redirecting to login...";
    ok.style.display = "block";
    setTimeout(() => location.href = "index.html", 1500);
  } else {
    err.textContent = d.error;
    err.style.display = "block";
  }
};
</script>
</body>
</html>
